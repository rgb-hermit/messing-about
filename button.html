<!DOCTYPE html>
<html>
<head>
  <title>button component</title>
  <style>
    .my-button {
      background: none;
      text-color: #000000;
      padding: 16px 32px;
      border: 1px;
      border-style: solide;
      border-color: #000000;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      <!--
      transition: 0.2s;
      -->
    }
    .my-button:hover {
      background: #000000;
      text-color: #ffffff
    }
  </style>
</head>
<body>
  <button class="my-button">this is a button</button>
</body>
</html>
