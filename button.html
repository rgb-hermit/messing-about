<!DOCTYPE html>
<html>
<head>
  <title>My Button Component</title>
  <style>
    .my-button {
      background: #007aff;
      color: white;
      padding: 12px 32px;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .my-button:hover {
      background: #005bb5;
    }
  </style>
</head>
<body>
  <button class="my-button">Click Me</button>
</body>
</html>
